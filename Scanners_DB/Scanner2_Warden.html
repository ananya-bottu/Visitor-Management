<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARDEN QR SCANNER</title>
    <script src="https://cdn.jsdelivr.net/gh/schmich/instascan-builds@master/instascan.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
    <link rel="stylesheet" href="style_scanner.css">
    <link rel="stylesheet" href="button.css">
    <style>
        .logo-container {
            position: absolute;
            top: 10px;
            right: 100px;
        }
        .logo {
            height: 50px; 
            width: auto;
            border-radius: 12px; 
        }
        .arrow-container {
        position:absolute;
        top:10px;
        left:10px;
      }
        </style>
</head>
<body>
    <div class="arrow-container">
        <button class="arrow-btn" aria-label="Back" onclick="history.go(-1)">
          <span class="arrow">←</span>
        </button>
        
        <button class="arrow-btn" aria-label="Forward" onclick="history.go(1)">
          <span class="arrow forward-arrow">→</span> <!-- Changed to right arrow -->
        </button>
      </div>
    <div class="scanner-container">
        <h1>WARDEN QR SCANNER</h1>
        <p class="scan-instruction">Position QR code within frame to scan</p>
        
        <video id="preview" width="100%" style="border-radius: 12px;"></video>
        
        <div id="result">Scan results will appear here...</div>
        
        <div class="buttons">
            <label class="btn btn-upload">
                Upload QR Image
                <input type="file" id="qr-input-file" accept="image/*" style="display: none;">
            </label>
            <button id="send-btn" class="btn btn-submit" disabled>
                Send Details
            </button>
        </div>
        <div id="status-message"></div>
    </div>

    <script>
        let scanner = new Instascan.Scanner({ video: document.getElementById('preview') });
        scanner.addListener('scan', function (content) {
            processQRCode(content);
        });
        
        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) {
                scanner.start(cameras[0]);
            } else {
                console.error('No cameras found.');
            }
        }).catch(function (e) {
            console.error(e);
        });
        
        document.getElementById("qr-input-file").addEventListener("change", function(event) {
            if (event.target.files.length === 0) return;
            
            let imageFile = event.target.files[0];
            let reader = new FileReader();
            reader.onload = function () {
                let img = new Image();
                img.src = reader.result;
                img.onload = function () {
                    let canvas = document.createElement("canvas");
                    let context = canvas.getContext("2d");
                    canvas.width = img.width;
                    canvas.height = img.height;
                    context.drawImage(img, 0, 0);
                    let imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    let code = jsQR(imageData.data, canvas.width, canvas.height);
                    if (code) {
                        processQRCode(code.data);
                    } else {
                        document.getElementById('status-message').textContent = "QR Code not detected.";
                        document.getElementById('status-message').className = "error";
                    }
                };
            };
            reader.readAsDataURL(imageFile);
        });

        function processQRCode(decodedText) {
    // Get current IST time (proper method)
    const options = {
        timeZone: 'Asia/Kolkata',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    };
    
    const now = new Date();
    const istTimeString = now.toLocaleString('en-IN', options);
    const [datePart, timePart] = istTimeString.split(', ');
    const [day, month, year] = datePart.split('/');
    const formattedDate = `${year}-${month}-${day} ${timePart}`;

    let lines = decodedText.split('\n').filter(line => line.trim() !== '');
    let extractedData = { name: "N/A", rollNumber: "N/A", phoneNumber: "N/A", carNumber: "N/A" };
    
    lines.forEach(line => {
        let [key, value] = line.split(':').map(part => part.trim());
        let lowerKey = key.toLowerCase();
        if (lowerKey.includes('name')) extractedData.name = value || "N/A";
        if (lowerKey.includes('roll') || lowerKey.includes('id')) extractedData.rollNumber = value || "N/A";
        if (lowerKey.includes('phone')) extractedData.phoneNumber = value?.match(/\d{10}/)?.[0] || "N/A";
        if (lowerKey.includes('car') || lowerKey.includes('vehicle')) extractedData.carNumber = value || "N/A";
    });
    
    document.getElementById('result').innerHTML = `
        <div class="data-field"><strong>Name:</strong> ${extractedData.name}</div>
        <div class="data-field"><strong>Student ID:</strong> ${extractedData.rollNumber}</div>
        <div class="data-field"><strong>Phone Number:</strong> ${extractedData.phoneNumber}</div>
        <div class="data-field"><strong>Car Number:</strong> ${extractedData.carNumber}</div>
        <div class="data-field"><strong>Scanned At:</strong> ${istTimeString}</div>
    `;
    
    document.getElementById('send-btn').disabled = false;

    // Send Data to PHP
    document.getElementById('send-btn').addEventListener('click', function() {
        // Get fresh IST time when button is clicked
        const clickTime = new Date();
        const istClickString = clickTime.toLocaleString('en-IN', options);
        const [clickDate, clickTimePart] = istClickString.split(', ');
        const [clickDay, clickMonth, clickYear] = clickDate.split('/');
        const mysqlFormattedTime = `${clickYear}-${clickMonth}-${clickDay} ${clickTimePart}`;

        let formData = new FormData();
        formData.append('name', extractedData.name);
        formData.append('roll_number', extractedData.rollNumber);
        formData.append('phone_number', extractedData.phoneNumber);
        formData.append('car_number', extractedData.carNumber);
        formData.append('scan2_time', mysqlFormattedTime);

        fetch('DUMB2.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('status-message').textContent = "✅ Entry saved successfully!";
                document.getElementById('status-message').className = "success";
            } else {
                document.getElementById('status-message').textContent = "❌ Error: " + data.message;
                document.getElementById('status-message').className = "error";
            }
        })
        .catch(error => {
            document.getElementById('status-message').textContent = "❌ Network error!";
            document.getElementById('status-message').className = "error";
            console.error("Error:", error);
        });
    });
}

    </script>
</body>
</html>
