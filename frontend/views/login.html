<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form</title>
  <link rel="stylesheet" href="../styles/button.css">
  <link rel="stylesheet" href="../styles/style1.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    .error-message {
      color: red;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
    .btn:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .form-error {
      color: red;
      text-align: center;
      margin-bottom: 10px;
      font-size: 14px;
      display: none;
    }
    .input-box {
      margin-bottom: 15px;
      position: relative;
    }
    #togglePassword {
      position: absolute;
      right: 45px; /* 👁️ eye is now to the left of the lock */
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #333;
    }
    .logo-container {
  position: absolute;
  top: 10px;
  right: 20px;
}
.logo {
  height: 50px; 
  width: auto;
  border-radius: 12px; 
}
.arrow-container {
    position:absolute;
    top:10px;
    left:10px;
  }

  </style>
</head>
<body>
  <div class="arrow-container">
    <button class="arrow-btn" aria-label="Back" onclick="history.go(-1)">
      <span class="arrow">←</span>
    </button>
    
    <button class="arrow-btn" aria-label="Forward" onclick="history.go(1)">
      <span class="arrow forward-arrow">→</span> <!-- Changed to right arrow -->
    </button>
  </div>
  <div class="logo-container">
    <img src="../assets/logo.png" alt="Logo" class="logo" />
  </div>
  <div class="wrapper">
    <form onsubmit="return handleLogin()" id="loginForm" novalidate>
      <h1>Login</h1>
      <div id="formError" class="form-error">Please fill all required fields correctly</div>

      <div class="input-box">
        <input type="email" id="email" placeholder="Mail" required oninput="validateLoginForm()" onblur="validateField('email')">
        <i class='bx bxs-user'></i>
        <div id="emailError" class="error-message">Please enter a valid email</div>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required oninput="validateLoginForm()" onblur="validateField('password')">
        <i class='bx bx-show' id="togglePassword"></i>
        <i class='bx bxs-lock-alt'></i>
        <div id="passwordError" class="error-message">
          Password must be at least 8 characters, including uppercase, lowercase, number, and special character
        </div>
      </div>

      <div class="remember-forget">
        <label><input type="checkbox" id="rememberMe"> Remember me</label>
      </div>

      <button type="submit" class="btn" id="loginBtn" disabled>Log in</button>

      <div class="register-link">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </form>
  </div>

  <script>
    window.onload = function () {
      const saved = localStorage.getItem("rememberedEmail");
      if (saved) {
        document.getElementById("email").value = saved;
        document.getElementById("rememberMe").checked = true;
      }
      validateLoginForm();
    };

    function validateField(fieldId) {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (fieldId === "email") {
        const emailPattern = /^[^\s@]+@[a-zA-Z]+\.([a-zA-Z]{2,})$/;
        document.getElementById("emailError").style.display =
          emailPattern.test(email) ? "none" : "block";
      }

      if (fieldId === "password") {
        const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
        document.getElementById("passwordError").style.display =
          passwordPattern.test(password) ? "none" : "block";
      }
    }

    function validateLoginForm() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const emailPattern = /^[^\s@]+@[a-zA-Z]+\.([a-zA-Z]{2,})$/;
      const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;

      const isValid = emailPattern.test(email) && passwordPattern.test(password);
      document.getElementById("loginBtn").disabled = !isValid;

      document.getElementById("formError").style.display = "none";
    }

    function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const rememberMe = document.getElementById("rememberMe").checked;

      const storedEmail = localStorage.getItem("registeredEmail");
      const storedPassword = localStorage.getItem("registeredPassword");

      if (!storedEmail || !storedPassword) {
        document.getElementById("formError").textContent = "No registered account found. Please sign up.";
        document.getElementById("formError").style.display = "block";
        return false;
      }

      if (email !== storedEmail) {
        document.getElementById("formError").textContent = "Invalid email. Please try again.";
        document.getElementById("formError").style.display = "block";
        return false;
      }

      if (password !== storedPassword) {
        document.getElementById("formError").textContent = "Incorrect password. Please try again.";
        document.getElementById("formError").style.display = "block";
        return false;
      }

      if (rememberMe) {
        localStorage.setItem("rememberedEmail", email);
      } else {
        localStorage.removeItem("rememberedEmail");
      }

      window.location.href = "parent_details.html";
      return false;
    }

    // 👁️ Password show/hide toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.classList.toggle('bx-show');
      this.classList.toggle('bx-hide');
    });
  </script>
</body>
</html>
